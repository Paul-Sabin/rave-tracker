{% extends "base.html" %}

{% block title %}Change Password - RA Tracker{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px;">
    <h1>Change Password</h1>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form action="/settings/change-password" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="current_password">Current Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="current_password" name="current_password"
                       class="form-control" required placeholder="Enter current password">
                <button type="button" class="password-toggle" onclick="toggleVisibility('current_password', 'eye-current')"
                        aria-label="Show password">
                    <svg id="eye-current" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="new_password">New Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="new_password" name="new_password"
                       class="form-control" required minlength="8"
                       placeholder="At least 8 characters">
                <button type="button" class="password-toggle" onclick="toggleVisibility('new_password', 'eye-new')"
                        aria-label="Show password">
                    <svg id="eye-new" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <!-- Strength meter -->
            <div class="strength-meter mt-1">
                <div id="strength-bar" class="strength-bar"></div>
            </div>
            <p id="strength-text" class="strength-text"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Update Password</button>
    </form>

    <p class="text-center mt-2">
        <a href="/settings">Back to settings</a>
    </p>
</div>

<style>
.password-input-wrapper {
    position: relative;
}
.password-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px;
    color: #666;
}
.password-toggle:hover {
    color: #333;
}
.strength-meter {
    height: 4px;
    background: #e9ecef;
    border-radius: 2px;
    overflow: hidden;
}
.strength-bar {
    height: 100%;
    width: 0;
    transition: width 0.2s, background-color 0.2s;
    border-radius: 2px;
}
.strength-text {
    font-size: 0.85rem;
    margin-top: 0.25rem;
    min-height: 1.2em;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
<script>
function toggleVisibility(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
}

document.getElementById('new_password').addEventListener('input', function(e) {
    const password = e.target.value;
    if (!password) {
        document.getElementById('strength-bar').style.width = '0';
        document.getElementById('strength-text').textContent = '';
        return;
    }

    const result = zxcvbn(password);
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    const colors = ['#ef4444', '#f59e0b', '#f59e0b', '#22c55e', '#22c55e'];
    const labels = ['Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
    const widths = ['20%', '40%', '60%', '80%', '100%'];

    strengthBar.style.width = widths[result.score];
    strengthBar.style.backgroundColor = colors[result.score];
    strengthText.textContent = labels[result.score];
    strengthText.style.color = colors[result.score];

    if (result.score <= 2 && result.feedback.warning) {
        strengthText.textContent += ': ' + result.feedback.warning;
    }
});
</script>
{% endblock %}
