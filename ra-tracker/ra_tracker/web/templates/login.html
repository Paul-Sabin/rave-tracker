{% extends "base.html" %}

{% block title %}Login - RA Tracker{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h1 style="text-align: center; margin-bottom: 1.5rem;">Login</h1>

    {% if error %}
    <div class="alert" style="background: rgba(233, 69, 96, 0.2); border: 1px solid var(--accent); padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
        {{ error }}
    </div>
    {% endif %}

    <div class="card">
        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       value="{{ email or '' }}" required autofocus
                       style="min-height: 44px;">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control"
                           required style="min-height: 44px; padding-right: 70px;">
                    <button type="button" onclick="togglePassword()"
                            style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
                                   background: none; border: none; color: var(--text-muted); cursor: pointer;
                                   padding: 8px;">
                        Show
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                    style="width: 100%; min-height: 44px; margin-top: 1rem;">
                Login
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account?
            <a href="/register" style="color: var(--accent);">Register</a>
        </p>
    </div>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    const btn = event.target;
    if (pwd.type === 'password') {
        pwd.type = 'text';
        btn.textContent = 'Hide';
    } else {
        pwd.type = 'password';
        btn.textContent = 'Show';
    }
}
</script>
{% endblock %}
