{% extends "base.html" %}

{% block title %}Link Expired - RA Tracker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="max-w-md w-full bg-white rounded-lg shadow-md p-8 text-center">
    <div class="mb-6">
      <svg class="mx-auto h-16 w-16 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-4">Link Expired</h1>

    <p class="text-gray-600 mb-6">
      {{ message }}
    </p>

    <a href="/login" class="inline-block w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors min-h-[44px] text-center">
      Go to Login
    </a>
  </div>
</div>
{% endblock %}
